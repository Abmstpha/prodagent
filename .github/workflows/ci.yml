name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -r backend/requirements.txt
      - name: Tests (offline — includes the 5/5 injection suite and MCP 3/3)
        run: pytest tests/ -v
        env:
          LLM_PROVIDER: mock

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy (backend)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
        run: |
          if [ -n "$HOOK" ]; then curl -fsS "$HOOK"; else echo "RENDER_DEPLOY_HOOK_BACKEND not set — skipping"; fi
      - name: Trigger Render deploy (frontend)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -n "$HOOK" ]; then curl -fsS "$HOOK"; else echo "RENDER_DEPLOY_HOOK_FRONTEND not set — skipping"; fi
