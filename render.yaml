services:
  - type: web
    name: prodagent-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: mistral
      - key: MISTRAL_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: MCP_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"

  - type: web
    name: prodagent-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://prodagent-backend.onrender.com
